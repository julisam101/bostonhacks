        async function fetchGoogleNearbyAttractions(dest) {
            if (!GOOGLE_PLACES_API_KEY) return null;
            const coords = destinationCoords[dest];
            if (!coords) return null;

            try {
                const params = new URLSearchParams({
                    location: `${coords.lat},${coords.lng}`,
                    radius: '1600',
                    type: 'tourist_attraction',
                    key: GOOGLE_PLACES_API_KEY
                });
                const url = `https://maps.googleapis.com/maps/api/place/nearbysearch/json?${params.toString()}`;
                const resp = await fetch(url);
                const data = await resp.json();

                if (data.status === 'ZERO_RESULTS') return [];
                if (data.status !== 'OK' || !Array.isArray(data.results)) return null;

                return data.results.slice(0, 5).map(place => {
                    const rating = typeof place.rating === 'number' ? `⭐ ${place.rating}` : 'Popular spot';
                    const area = place.vicinity || 'Boston';
                    return {
                        name: place.name,
                        desc: `${rating} • ${area}`
                    };
                });
            } catch (e) {
                return null;
            }
        }

        async function fetchTripadvisorAttractions(dest) {
            if (!TRIPADVISOR_API_KEY) return null;
            try {
                const searchParams = new URLSearchParams({
                    searchQuery: `${dest}, Boston`,
                    category: 'attractions',
                    language: 'en',
                    key: TRIPADVISOR_API_KEY
                });

                const searchUrl = `https://api.content.tripadvisor.com/api/v1/location/search?${searchParams.toString()}`;
                const searchResp = await fetch(searchUrl);
                if (!searchResp.ok) return null;
                const searchData = await searchResp.json();
                const candidates = Array.isArray(searchData.data) ? searchData.data.slice(0, 5) : [];
                if (!candidates.length) return [];

                const details = await Promise.all(candidates.map(async c => {
                    const id = c.location_id;
                    if (!id) return null;
                    const detailParams = new URLSearchParams({
                        language: 'en',
                        currency: 'USD',
                        key: TRIPADVISOR_API_KEY
                    });
                    const detailUrl = `https://api.content.tripadvisor.com/api/v1/location/${id}/details?${detailParams.toString()}`;
                    const detailResp = await fetch(detailUrl);
                    if (!detailResp.ok) return null;
                    const d = await detailResp.json();
                    const ratingText = d.rating ? `⭐ ${d.rating}` : 'Popular spot';
                    const addr = d.address_obj?.city ? `${d.address_obj.city}` : 'Boston';
                    return {
                        name: d.name || c.name,
                        desc: `${ratingText} • ${addr}`
                    };
                }));

                return details.filter(Boolean);
            } catch (e) {
                return null;
            }
        }

        async function fetchPredictions(city, routeText) {
            const stop = neighborhoodStops[city];
            if (!stop) return;
            try {
                const lines = detectLines(routeText || '');
                const routeFilter = lines.length > 0 ? `&filter[route]=${encodeURIComponent(lines.join(','))}` : '';
                const url = `https://api-v3.mbta.com/predictions?filter[stop]=${stop.id}${routeFilter}&sort=departure_time&page[limit]=8&api_key=${MBTA_API_KEY}`;
                const resp = await fetch(url);
                const data = await resp.json();
                const now = new Date();
                const seen = new Set();
                const preds = (data.data || []).filter(p => {
                    const t = p.attributes.departure_time || p.attributes.arrival_time;
                    if (!t || new Date(t) < now) return false;
                    const routeId = p.relationships?.route?.data?.id || '';
                    const key = `${routeId}|${t}`;
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                }).slice(0, 5);
                renderPredictionsBox(preds, stop.name);
            } catch(e) {
                renderPredictionsBox(null, stop.name);
            }
        }

        function renderPredictionsBox(preds, stopName) {
            const box = document.getElementById('departures-box');
            if (!box) return;
            if (!preds) {
                box.innerHTML = `<div class="live-box"><p class="live-status">⚠️ Could not load departures for ${stopName}</p></div>`;
                return;
            }
            if (preds.length === 0) {
                box.innerHTML = `<div class="live-box"><p class="live-status">🚉 No upcoming departures at ${stopName}</p></div>`;
                return;
            }
            const now = new Date();
            const items = preds.map(p => {
                const routeId = p.relationships?.route?.data?.id || '';
                const depTime = p.attributes.departure_time || p.attributes.arrival_time;
                let timeStr = '—';
                let urgent = false;
                if (depTime) {
                    const mins = Math.round((new Date(depTime) - now) / 60000);
                    if (mins <= 0) { timeStr = 'Now'; urgent = true; }
                    else if (mins < 60) { timeStr = `${mins} min`; urgent = mins <= 2; }
                    else timeStr = new Date(depTime).toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'});
                }
                const label = ROUTE_LABELS[routeId] || routeId;
                const status = p.attributes.status ? `<span class="dep-status">${p.attributes.status}</span>` : '';
                return `<div class="dep-row">
                    <span class="dep-route">${label}</span>
                    ${status}
                    <span class="dep-time${urgent ? ' dep-urgent' : ''}">${timeStr}</span>
                </div>`;
            }).join('');
            box.innerHTML = `<div class="live-box">
                <p class="live-title">🚉 Next Departures — ${stopName}</p>
                ${items}
            </div>`;
        }

        function detectLines(routeText) {
            const lines = [];
            if (/orange\s+line/i.test(routeText)) lines.push('Orange');
            if (/red\s+line/i.test(routeText)) lines.push('Red');
            if (/blue\s+line/i.test(routeText)) lines.push('Blue');
            if (/green\s+line/i.test(routeText)) lines.push('Green-B', 'Green-C', 'Green-D', 'Green-E');
            if (/silver\s+line/i.test(routeText)) lines.push('741', '742', '749');
            return lines;
        }

        async function fetchAlertsForRoute(routeText) {
            const lines = detectLines(routeText);
            if (lines.length === 0) {
                renderAlertsBox([]);
                return;
            }
            try {
                const routeFilter = lines.join(',');
                const url = `https://api-v3.mbta.com/alerts?filter[route]=${encodeURIComponent(routeFilter)}&filter[activity]=BOARD,EXIT,RIDE&api_key=${MBTA_API_KEY}`;
                const resp = await fetch(url);
                if (!resp.ok) {
                    throw new Error(`MBTA alerts request failed: ${resp.status}`);
                }
                const data = await resp.json();
                const now = new Date();
                const active = (Array.isArray(data.data) ? data.data : []).filter(alert => {
                    const attrs = alert?.attributes || {};
                    const severity = typeof attrs.severity === 'number' ? attrs.severity : 0;
                    if (severity < 5) return false;

                    const periods = Array.isArray(attrs.active_period) ? attrs.active_period : [];
                    if (periods.length === 0) return false;

                    return periods.some(p => {
                        const start = p?.start ? new Date(p.start) : null;
                        const end = p?.end ? new Date(p.end) : null;
                        if (!start || Number.isNaN(start.getTime())) return false;
                        if (end && Number.isNaN(end.getTime())) return false;
                        return start <= now && (!end || end >= now);
                    });
                });
                renderAlertsBox(active);
            } catch (e) {
                renderAlertsBox(null);
            }
        }

        function renderAlertsBox(alerts) {
            const box = document.getElementById('alerts-box');
            if (!box) return;
            if (alerts === null) {
                box.innerHTML = '<div class="live-box"><p class="live-status">✅ No active service alerts for your lines</p></div>';
            } else if (alerts.length === 0) {
                box.innerHTML = '<div class="live-box"><p class="live-status">✅ No active service alerts for your lines</p></div>';
            } else {
                const items = alerts.slice(0, 4).map(a => {
                    const icon = a.attributes.severity >= 7 ? '🚨' : '⚠️';
                    return `<div class="alert-item">${icon} ${a.attributes.header}</div>`;
                }).join('');
                box.innerHTML = `<div class="live-box"><p class="live-title">⚡ Live Service Alerts</p>${items}</div>`;
            }
        }

        if (city && dest) {
            const lookupCity = routes[city] ? city : (originAliases[city] || city);
            const lookupDest = (routes[lookupCity] && routes[lookupCity][dest]) ? dest : (destinationAliases[dest] || dest);
            const route = routes[lookupCity]?.[lookupDest] || null;

            if (route) {
                document.getElementById("routeBox").innerHTML = `
                    <h1>Your Route</h1>
                    <div class="route-details">
                        <div class="location from">
                            <p class="label">From:</p>
                            <p class="name">${city}</p>
                        </div>
                        <div class="arrow-large">→</div>
                        <div class="location to">
                            <p class="label">To:</p>
                            <p class="name">${dest}</p>
                        </div>
                    </div>
                    <div class="route-instructions">
                        <h2>Directions:</h2>
                        <p class="instruction">${route}</p>
                    </div>
                    <div class="route-actions">
                        <button id="toggle-attractions" class="route-dropdown-btn" type="button" aria-expanded="false" aria-controls="attractions-panel">
                            See attractions nearby ▼
                        </button>
                    </div>
                    <div id="nearby-attractions"></div>
                `;

                fetchAlertsForRoute(route);
                fetchPredictions(lookupCity, route);
                renderAttractionsBox(lookupDest);
            } else {
                document.getElementById("routeBox").innerHTML = `
                    <h1>Route Not Found</h1>
                    <p>We don't have a specific route for <strong>${city} → ${dest}</strong>, but here's a general guide:</p>
                    <p>Head to the nearest subway station and ask for directions, or check out the MBTA map at your local station.</p>
                    <p><a href="startpage.html" class="link">Try Another Route</a></p>
                `;
            }
        } else {
            document.getElementById("routeBox").innerHTML = `
                <h1>No Route Selected</h1>
                <p>Please select both a starting location and a destination.</p>
                <p><a href="startpage.html" class="link">Go Back and Plan a Route</a></p>
            `;
        }
    </script>
</body>

</html>
